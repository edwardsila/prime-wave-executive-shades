<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="64" height="64" fill="#007AFF" rx="14"/>
  
  <!-- Shade icon -->
  <g id="favicon-shade">
    <!-- Top beam -->
    <rect x="12" y="14" width="40" height="3" rx="1.5" fill="white"/>
    
    <!-- Left support -->
    <rect x="14" y="17" width="2.5" height="20" rx="1" fill="white"/>
    
    <!-- Right support -->
    <rect x="47.5" y="17" width="2.5" height="20" rx="1" fill="white"/>
    
    <!-- Shade fabric lines -->
    <line x1="16" y1="18" x2="48" y2="18" stroke="white" stroke-width="1.2" opacity="0.9"/>
    <line x1="15.5" y1="22" x2="48.5" y2="22" stroke="white" stroke-width="1.2" opacity="0.8"/>
    <line x1="15" y1="26" x2="49" y2="26" stroke="white" stroke-width="1.2" opacity="0.7"/>
    <line x1="14" y1="30" x2="50" y2="30" stroke="white" stroke-width="1.2" opacity="0.6"/>
    
    <!-- Bottom edge -->
    <rect x="12" y="35" width="40" height="2" rx="1" fill="white" opacity="0.9"/>
    
    <!-- Car -->
    <rect x="10" y="40" width="44" height="16" rx="3" fill="white" opacity="0.85"/>
    <circle cx="17" cy="54" r="2.5" fill="#333"/>
    <circle cx="47" cy="54" r="2.5" fill="#333"/>
  </g>
</svg>
